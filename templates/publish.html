{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white py-3">
                <h5 class="mb-0 fw-bold">🌱 发布新农产品</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('publish_product') }}" enctype="multipart/form-data">

                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">商品名称</label>
                            <input type="text" name="name" class="form-control" required placeholder="例如：高山有机红富士苹果">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">商品分类</label>
                            <select name="category" class="form-select" required>
                                <option value="" disabled selected>请选择分类</option>
                                <option value="水果">🍎 水果鲜果</option>
                                <option value="蔬菜">🥦 新鲜蔬菜</option>
                                <option value="肉禽蛋">🥚 肉禽蛋品</option>
                                <option value="粮油">🍚 粮油米面</option>
                                <option value="特产">🎁 地方特产</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">产地</label>
                            <input type="text" name="origin" class="form-control" required placeholder="例如：山东烟台">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">运费模板</label>
                            <select name="shipping_template_id" class="form-select" required>
                                <option value="1">默认运费 (¥10)</option>
                                <option value="2">冷链运费 (¥25)</option>
                                <option value="3">✨ 免运费 (¥0)</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-4">

                    <h5 class="mb-3 text-success">默认商品规格 (SKU) 信息</h5>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">规格名称</label>
                            <input type="text" name="spec_name" class="form-control" value="普通 500g 装" required placeholder="例如：5斤装、礼盒装">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">规格价格 (元)</label>
                            <div class="input-group">
                                <span class="input-group-text">￥</span>
                                <input type="number" step="0.01" name="price" class="form-control" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">规格库存数量</label>
                            <input type="number" name="stock" class="form-control" value="100" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">商品图片</label>
                        <div class="input-group">
                            <input type="file" name="image_file" class="form-control" accept="image/*">
                        </div>
                        <div class="form-text text-muted">
                            <small>支持 jpg, png, gif 格式。</small>
                        </div>
                        <input type="url" name="image_url" class="form-control mt-2" placeholder="或者输入网络图片 URL (可选)">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">商品详细描述</label>
                        <textarea name="description" class="form-control" rows="5" placeholder="请详细描述您的农产品特色..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary px-4 me-md-2">取消</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">立即发布上架</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
