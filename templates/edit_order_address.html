{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow mt-4">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">📍 修改订单 #{{ order.order_id }} 收货信息</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>当前订单状态:</strong> {{ order.status_map[order.status] }}。修改仅在订单未发货前有效。
                </div>
                <form method="POST" action="{{ url_for('edit_order_address', order_id=order.order_id) }}">
                    <div class="mb-3">
                        <label class="form-label">收货人姓名</label>
                        <input type="text" name="receiver_name" class="form-control" value="{{ order.receiver_name or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">联系电话</label>
                        <input type="text" name="receiver_phone" class="form-control" value="{{ order.receiver_phone or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">收货地址</label>
                        <textarea name="address" class="form-control" rows="3" required>{{ order.address or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('order_detail', order_id=order.order_id) }}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-warning fw-bold">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
