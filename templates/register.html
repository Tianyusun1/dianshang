{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">用户注册</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">选择身份</label>
                        <select name="role" class="form-select">
                            <option value="0">我是消费者 (购买助农产品)</option>
                            <option value="1">我是农户 (入驻销售产品)</option>
                        </select>
                        <div class="form-text text-muted">
                            <small>注：农户账号注册后，需通过管理员审核才能发布商品。</small>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">立即注册</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light">
                <small>已有账号? <a href="{{ url_for('login') }}" class="text-success">去登录</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
